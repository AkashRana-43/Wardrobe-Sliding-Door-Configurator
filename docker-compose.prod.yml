# docker-compose.prod.yml (monorepo root)

name: wardrobe-configurator-prod

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  strapi:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      NODE_ENV: production
    env_file:
      - ./apps/api/.env
    volumes:
      - strapi_uploads:/app/public/uploads
    ports:
      - "1337:1337"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
  strapi_uploads: