# docker-compose.yml (monorepo root)

name: wardrobe-configurator

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wardrobe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wardrobe_configurator
      POSTGRES_USER: strapi_user
      POSTGRES_PASSWORD: Str4p!W4rdr0be#2026
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi_user -d wardrobe_configurator"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wardrobe_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Strapi ──────────────────────────────────────────────────────────────────
  strapi:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: wardrobe_strapi
    restart: unless-stopped
    env_file:
      - ./apps/api/.env 
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/public/uploads:/app/public/uploads
      - strapi_node_modules:/app/node_modules 
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  strapi_node_modules: